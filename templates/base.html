<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Beehive Of AI{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #FFF8E7;
            color: #4A3728;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            background-color: #4A3728;
            padding: 0 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #F5A623;
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        /* ── Navigation ── */
        nav {
            display: flex;
            gap: 0.25rem;
        }

        nav a {
            color: #FFF8E7;
            text-decoration: none;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: background 0.2s, color 0.2s;
        }

        nav a:hover {
            background-color: #F5A623;
            color: #4A3728;
        }

        /* ── Main content ── */
        main {
            flex: 1;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            padding: 2.5rem 1.5rem;
        }

        /* ── Footer ── */
        footer {
            background-color: #4A3728;
            color: #FFF8E7;
            text-align: center;
            padding: 1.2rem 1rem;
            font-size: 0.85rem;
            opacity: 0.9;
        }

        /* ── Utility classes ── */
        .btn {
            display: inline-block;
            background-color: #F5A623;
            color: #4A3728;
            padding: 0.65rem 1.6rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background-color: #e0941a;
            transform: translateY(-1px);
        }

        .btn-outline {
            background-color: transparent;
            border: 2px solid #F5A623;
            color: #F5A623;
        }

        .btn-outline:hover {
            background-color: #F5A623;
            color: #4A3728;
        }

        .card {
            background: #fff;
            border: 1px solid #e8dcc8;
            border-radius: 12px;
            padding: 1.75rem;
            box-shadow: 0 2px 8px rgba(74,55,40,0.07);
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #4A3728;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <a href="/" class="logo">🐝 Beehive Of AI</a>
        <nav>
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/hives">Browse Hives</a>
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        </nav>
    </div>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    &copy; 2025 Beehive Of AI &mdash; Personal Computers Working Together as One Powerful AI
</footer>

</body>
</html>
