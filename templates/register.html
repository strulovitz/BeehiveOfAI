{% extends "base.html" %}
{% block title %}Register — Beehive Of AI{% endblock %}

{% block content %}
<style>
    .auth-wrap {
        max-width: 480px;
        margin: 3rem auto;
    }

    .auth-wrap h1 {
        font-size: 2rem;
        font-weight: 800;
        color: #4A3728;
        text-align: center;
        margin-bottom: 0.4rem;
    }

    .auth-wrap .sub {
        text-align: center;
        color: #7a5c48;
        margin-bottom: 2rem;
        font-size: 0.97rem;
    }

    .auth-card {
        background: #fff;
        border: 1px solid #e8dcc8;
        border-radius: 14px;
        padding: 2.25rem 2rem;
        box-shadow: 0 2px 10px rgba(74,55,40,0.09);
    }

    .form-group {
        margin-bottom: 1.2rem;
    }

    .form-group label {
        display: block;
        font-weight: 600;
        color: #4A3728;
        margin-bottom: 0.4rem;
        font-size: 0.95rem;
    }

    .form-group input,
    .form-group select {
        width: 100%;
        padding: 0.65rem 0.9rem;
        border: 1.5px solid #d4c4b0;
        border-radius: 8px;
        font-size: 1rem;
        color: #4A3728;
        background: #FFF8E7;
        transition: border-color 0.2s;
        outline: none;
    }

    .form-group input:focus,
    .form-group select:focus {
        border-color: #F5A623;
        background: #fff;
    }

    .form-group .hint {
        font-size: 0.82rem;
        color: #9a7560;
        margin-top: 0.3rem;
    }

    .btn-full {
        width: 100%;
        padding: 0.75rem;
        font-size: 1.05rem;
        margin-top: 0.5rem;
    }

    .auth-footer {
        text-align: center;
        margin-top: 1.25rem;
        font-size: 0.93rem;
        color: #7a5c48;
    }

    .auth-footer a {
        color: #F5A623;
        font-weight: 600;
        text-decoration: none;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>

<div class="auth-wrap">
    <h1>🐝 Join the Hive</h1>
    <p class="sub">Create your Beehive Of AI account</p>

    <div class="auth-card">
        <form action="/register" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="AwesomeWorkerBee42" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Choose a strong password" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="+1 555 000 0000">
                <span class="hint">Used for SMS verification (coming soon)</span>
            </div>
            <div class="form-group">
                <label for="role">I want to be a:</label>
                <select id="role" name="role">
                    <option value="worker">💻 Worker Bee — Share my computer's AI power and earn money</option>
                    <option value="queen">👑 Queen Bee — Manage a team and orchestrate AI tasks</option>
                    <option value="beekeeper">🏢 Beekeeper — Submit AI tasks and pay for results</option>
                </select>
            </div>
            <button type="submit" class="btn btn-full">Register</button>
        </form>
    </div>

    <p class="auth-footer">
        Already have an account? <a href="/login">Login here</a>
    </p>
</div>
{% endblock %}
